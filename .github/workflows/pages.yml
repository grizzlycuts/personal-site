name: Deploy site to GitHub Pages

# Builds a clean _site/ containing only the static site (so chats/, CLAUDE.md
# and project/ notes are never published) and deploys it to GitHub Pages.
# NOTE: in repo Settings → Pages, set Source = "GitHub Actions" (one-time).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          set -euo pipefail
          rm -rf _site && mkdir -p _site
          # site entry + root-level scripts referenced by index.html
          cp index.html image-slot.js tweaks-panel.jsx _site/
          cp -r css js _site/
          # saved photos: per-slot sidecars + manifest (dotfiles). The app
          # fetch()es these at runtime, so they must ship with the site.
          shopt -s nullglob
          for f in .image-slots*.state.json; do cp "$f" _site/; done
          # disable Jekyll so dot-prefixed files are served verbatim
          touch _site/.nojekyll
          echo "Assembled _site:" && ls -la _site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
